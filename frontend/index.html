<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d12;
      --surface:   #15151e;
      --border:    #1f1f2e;
      --accent:    #7c6aff;
      --accent2:   #ff6a9b;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --text:      #e8e8f0;
      --muted:     #6b6b85;
      --radius:    12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LAYOUT ─────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ────────────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 32px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }

    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      cursor: pointer; color: var(--muted);
      font-size: 14px; font-weight: 500;
      transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--border); color: var(--text); }
    .nav-item.active { background: rgba(124,106,255,0.15); color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      padding: 0 14px;
    }

    /* ── MAIN ───────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }

    .topbar h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 700;
      flex: 1;
    }

    .btn {
      padding: 10px 20px; border-radius: var(--radius);
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: #9580ff; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ── STATS ──────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      animation: fadeUp 0.4s ease both;
    }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 700;
    }
    .stat-card:nth-child(1) .stat-value { color: var(--text); }
    .stat-card:nth-child(2) .stat-value { color: var(--yellow); }
    .stat-card:nth-child(3) .stat-value { color: var(--accent); }
    .stat-card:nth-child(4) .stat-value { color: var(--green); }

    /* ── FILTERS ────────────────────────────────── */
    .filters {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 32px 0;
    }

    .filter-btn {
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 13px; cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── TASK LIST ──────────────────────────────── */
    .tasks-container { flex: 1; overflow-y: auto; padding: 20px 32px 40px; }

    .tasks-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      transition: all 0.2s;
      animation: fadeUp 0.3s ease both;
      cursor: pointer;
    }
    .task-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .task-card.done { opacity: 0.5; }

    .task-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; transition: all 0.2s;
      font-size: 11px; color: #fff;
    }
    .task-check.checked { background: var(--green); border-color: var(--green); }
    .task-check:hover { border-color: var(--green); }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-card.done .task-title { text-decoration: line-through; }
    .task-meta { display: flex; gap: 10px; margin-top: 4px; align-items: center; }

    .badge {
      padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge-pending    { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .badge-in_progress{ background: rgba(124,106,255,0.15); color: var(--accent); }
    .badge-done       { background: rgba(52,211,153,0.15);  color: var(--green); }
    .badge-high   { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-medium { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .badge-low    { background: rgba(100,100,120,0.15); color: var(--muted); }

    .task-date { font-size: 12px; color: var(--muted); }

    .cat-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    .task-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.15s; }
    .task-card:hover .task-actions { opacity: 1; }
    .action-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--border); border: none;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.15s;
    }
    .action-btn:hover { background: var(--red); color: #fff; }
    .action-btn.edit:hover { background: var(--accent); color: #fff; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 60px 0;
      color: var(--muted); text-align: center;
    }
    .empty-icon { font-size: 40px; }

    /* ── MODAL ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 480px; max-width: 95vw;
      transform: translateY(20px); transition: transform 0.2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 700; margin-bottom: 20px;
    }

    .form-grid { display: flex; flex-direction: column; gap: 14px; }
    .form-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .field input, .field select, .field textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }
    .field textarea { resize: none; height: 80px; }
    .field select option { background: var(--surface); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── TOAST ──────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px; font-size: 14px;
      transform: translateY(80px); transition: transform 0.3s;
      z-index: 200;
    }
    .toast.show { transform: translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red);   }

    /* ── ANIMATIONS ─────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLLBAR ──────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-dot"></span> TaskFlow
    </div>

    <nav class="nav">
      <span class="sidebar-section-title">Menu</span>
      <button class="nav-item active" onclick="filterByStatus(null)">
        <span class="nav-icon">📋</span> Todas as Tarefas
      </button>
      <button class="nav-item" onclick="filterByStatus('pending')">
        <span class="nav-icon">⏳</span> Pendentes
      </button>
      <button class="nav-item" onclick="filterByStatus('in_progress')">
        <span class="nav-icon">🔄</span> Em Andamento
      </button>
      <button class="nav-item" onclick="filterByStatus('done')">
        <span class="nav-icon">✅</span> Concluídas
      </button>
    </nav>

    <div style="margin-top:auto; padding: 12px 14px; background: rgba(124,106,255,0.08); border-radius: var(--radius); border: 1px solid rgba(124,106,255,0.2);">
      <div style="font-size:12px; color: var(--accent); font-weight:600; margin-bottom:4px;">API Backend</div>
      <div style="font-size:11px; color: var(--muted);">FastAPI + MySQL</div>
      <div id="api-status" style="font-size:11px; margin-top:6px; color: var(--muted);">⚪ Verificando…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <h1>Tarefas</h1>
      <button class="btn btn-ghost" onclick="loadTasks()">↺ Atualizar</button>
      <button class="btn btn-primary" onclick="openModal()">+ Nova Tarefa</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">TOTAL</span>
        <span class="stat-value" id="stat-total">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">PENDENTES</span>
        <span class="stat-value" id="stat-pending">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">EM ANDAMENTO</span>
        <span class="stat-value" id="stat-progress">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">CONCLUÍDAS</span>
        <span class="stat-value" id="stat-done">—</span>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <span style="font-size:13px; color:var(--muted);">Prioridade:</span>
      <button class="filter-btn active" onclick="setPriority(null, this)">Todas</button>
      <button class="filter-btn" onclick="setPriority('high', this)">Alta</button>
      <button class="filter-btn" onclick="setPriority('medium', this)">Média</button>
      <button class="filter-btn" onclick="setPriority('low', this)">Baixa</button>
    </div>

    <!-- TASK LIST -->
    <div class="tasks-container">
      <div class="tasks-list" id="tasks-list">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>Carregando tarefas…</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nova Tarefa</div>
    <div class="form-grid">
      <div class="field">
        <label>Título *</label>
        <input type="text" id="f-title" placeholder="O que precisa ser feito?" />
      </div>
      <div class="field">
        <label>Descrição</label>
        <textarea id="f-desc" placeholder="Detalhes adicionais…"></textarea>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="pending">Pendente</option>
            <option value="in_progress">Em Andamento</option>
            <option value="done">Concluída</option>
          </select>
        </div>
        <div class="field">
          <label>Prioridade</label>
          <select id="f-priority">
            <option value="medium">Média</option>
            <option value="high">Alta</option>
            <option value="low">Baixa</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Prazo</label>
          <input type="date" id="f-date" />
        </div>
        <div class="field">
          <label>Categoria</label>
          <select id="f-category">
            <option value="">— Sem categoria —</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Salvar Tarefa</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  const USER_ID = 1; // Demo user

  let currentStatus   = null;
  let currentPriority = null;
  let editingTaskId   = null;
  let categories      = [];

  // ── API helpers ────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Toast ──────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Status check ───────────────────────────────────────
  async function checkApi() {
    const el = document.getElementById('api-status');
    try {
      await apiFetch('/');
      el.textContent = '🟢 API conectada';
      el.style.color = 'var(--green)';
    } catch {
      el.textContent = '🔴 API offline';
      el.style.color = 'var(--red)';
    }
  }

  // ── Stats ──────────────────────────────────────────────
  async function loadStats() {
    try {
      const s = await apiFetch(`/users/${USER_ID}/stats`);
      document.getElementById('stat-total').textContent   = s.total;
      document.getElementById('stat-pending').textContent = s.pending;
      document.getElementById('stat-progress').textContent= s.in_progress;
      document.getElementById('stat-done').textContent    = s.done;
    } catch {}
  }

  // ── Categories ─────────────────────────────────────────
  async function loadCategories() {
    try {
      categories = await apiFetch(`/users/${USER_ID}/categories`);
      const sel = document.getElementById('f-category');
      sel.innerHTML = '<option value="">— Sem categoria —</option>';
      categories.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
    } catch {}
  }

  // ── Tasks ──────────────────────────────────────────────
  async function loadTasks() {
    const list = document.getElementById('tasks-list');
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>Carregando…</div></div>';

    let url = `/users/${USER_ID}/tasks`;
    const params = [];
    if (currentStatus)   params.push(`status=${currentStatus}`);
    if (currentPriority) params.push(`priority=${currentPriority}`);
    if (params.length)   url += '?' + params.join('&');

    try {
      const tasks = await apiFetch(url);
      renderTasks(tasks);
    } catch {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>Erro ao carregar. Verifique se a API está rodando.</div></div>';
    }

    await loadStats();
  }

  function renderTasks(tasks) {
    const list = document.getElementById('tasks-list');
    if (!tasks.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div>Nenhuma tarefa encontrada</div></div>';
      return;
    }

    const statusLabel = { pending: 'Pendente', in_progress: 'Em Andamento', done: 'Concluída' };
    const priorityLabel = { low: 'Baixa', medium: 'Média', high: 'Alta' };

    list.innerHTML = tasks.map((t, i) => {
      const cat = t.category;
      const catDot = cat ? `<span class="cat-dot" style="background:${cat.color}"></span><span style="font-size:12px;color:var(--muted)">${cat.name}</span>` : '';
      const dateStr = t.due_date ? `<span class="task-date">📅 ${t.due_date}</span>` : '';
      const checked = t.status === 'done' ? 'checked' : '';

      return `
        <div class="task-card ${t.status === 'done' ? 'done' : ''}" style="animation-delay:${i * 0.04}s">
          <div class="task-check ${checked}" onclick="toggleDone(${t.id}, '${t.status}')">
            ${checked ? '✓' : ''}
          </div>
          <div class="task-info">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">
              <span class="badge badge-${t.status}">${statusLabel[t.status]}</span>
              <span class="badge badge-${t.priority}">${priorityLabel[t.priority]}</span>
              ${catDot}
              ${dateStr}
            </div>
          </div>
          <div class="task-actions">
            <button class="action-btn edit" title="Editar" onclick="editTask(${t.id})">✎</button>
            <button class="action-btn" title="Deletar" onclick="deleteTask(${t.id})">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  async function toggleDone(id, currentStatus) {
    const newStatus = currentStatus === 'done' ? 'pending' : 'done';
    try {
      await apiFetch(`/tasks/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: newStatus }),
      });
      loadTasks();
    } catch { toast('Erro ao atualizar', 'error'); }
  }

  async function deleteTask(id) {
    if (!confirm('Deletar esta tarefa?')) return;
    try {
      await apiFetch(`/tasks/${id}`, { method: 'DELETE' });
      toast('Tarefa deletada');
      loadTasks();
    } catch { toast('Erro ao deletar', 'error'); }
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal(task = null) {
    editingTaskId = task ? task.id : null;
    document.getElementById('modal-title').textContent = task ? 'Editar Tarefa' : 'Nova Tarefa';
    document.getElementById('f-title').value    = task?.title       ?? '';
    document.getElementById('f-desc').value     = task?.description ?? '';
    document.getElementById('f-status').value   = task?.status      ?? 'pending';
    document.getElementById('f-priority').value = task?.priority    ?? 'medium';
    document.getElementById('f-date').value     = task?.due_date    ?? '';
    document.getElementById('f-category').value = task?.category_id ?? '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingTaskId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === e.currentTarget) closeModal();
  }

  async function editTask(id) {
    try {
      // Buscar dados da tarefa da lista já carregada via re-fetch simples
      const tasks = await apiFetch(`/users/${USER_ID}/tasks`);
      const task = tasks.find(t => t.id === id);
      if (task) openModal(task);
    } catch { toast('Erro ao carregar tarefa', 'error'); }
  }

  async function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { toast('Título é obrigatório', 'error'); return; }

    const payload = {
      title,
      description:  document.getElementById('f-desc').value || null,
      status:       document.getElementById('f-status').value,
      priority:     document.getElementById('f-priority').value,
      due_date:     document.getElementById('f-date').value   || null,
      category_id:  document.getElementById('f-category').value ? +document.getElementById('f-category').value : null,
    };

    try {
      if (editingTaskId) {
        await apiFetch(`/tasks/${editingTaskId}`, { method: 'PATCH', body: JSON.stringify(payload) });
        toast('Tarefa atualizada ✓');
      } else {
        await apiFetch('/tasks', { method: 'POST', body: JSON.stringify({ ...payload, user_id: USER_ID }) });
        toast('Tarefa criada ✓');
      }
      closeModal();
      loadTasks();
    } catch { toast('Erro ao salvar tarefa', 'error'); }
  }

  // ── Filters ────────────────────────────────────────────
  function filterByStatus(status) {
    currentStatus = status;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadTasks();
  }

  function setPriority(priority, btn) {
    currentPriority = priority;
